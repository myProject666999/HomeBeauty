<h2>确认预约</h2>

<div *ngIf="service" class="confirm-container">
  <div class="service-summary card">
    <h3>服务信息</h3>
    <div class="summary-row">
      <span class="label">服务项目：</span>
      <span class="value">{{ service.name }}</span>
    </div>
    <div class="summary-row">
      <span class="label">服务价格：</span>
      <span class="value price">¥{{ service.basePrice }}</span>
    </div>
    <div class="summary-row">
      <span class="label">服务时长：</span>
      <span class="value">约{{ service.defaultDuration }}分钟</span>
    </div>
  </div>

  <form [formGroup]="orderForm" (ngSubmit)="submitOrder()" class="order-form card">
    <h3>预约信息</h3>

    <div class="form-group">
      <label>联系人姓名 *</label>
      <input type="text" formControlName="contactName" class="form-control" placeholder="请输入您的姓名">
      <div *ngIf="orderForm.get('contactName')?.touched && orderForm.get('contactName')?.invalid" class="error-text">
        请输入联系人姓名
      </div>
    </div>

    <div class="form-group">
      <label>联系电话 *</label>
      <input type="tel" formControlName="contactPhone" class="form-control" placeholder="请输入手机号码">
      <div *ngIf="orderForm.get('contactPhone')?.touched && orderForm.get('contactPhone')?.invalid" class="error-text">
        请输入正确的手机号码
      </div>
    </div>

    <div class="form-group">
      <label>上门地址 *</label>
      <input type="text" formControlName="address" class="form-control" placeholder="请输入详细地址">
      <div *ngIf="orderForm.get('address')?.touched && orderForm.get('address')?.invalid" class="error-text">
        请输入上门地址
      </div>
    </div>

    <div class="form-group">
      <label>预约日期 *</label>
      <input type="date" formControlName="appointmentDate" class="form-control" [min]="selectedDate">
      <div *ngIf="orderForm.get('appointmentDate')?.touched && orderForm.get('appointmentDate')?.invalid" class="error-text">
        请选择预约日期
      </div>
    </div>

    <div class="form-group">
      <label>预约时段 *</label>
      <select formControlName="appointmentTime" class="form-control">
        <option value="">请选择时段</option>
        <option *ngFor="let slot of timeSlots" [value]="slot">{{ slot }}</option>
      </select>
      <div *ngIf="orderForm.get('appointmentTime')?.touched && orderForm.get('appointmentTime')?.invalid" class="error-text">
        请选择预约时段
      </div>
    </div>

    <div class="form-group">
      <label>备注</label>
      <textarea formControlName="remark" class="form-control" rows="3" placeholder="其他需求或注意事项"></textarea>
    </div>

    <button type="submit" class="btn btn-primary btn-block" [disabled]="submitting">
      {{ submitting ? '提交中...' : '确认预约' }}
    </button>
  </form>
</div>

<div *ngIf="!service" class="empty">
  请先选择服务项目
</div>
