<div *ngIf="loading" class="loading">加载中...</div>

<div *ngIf="!loading && service" class="detail-container">
  <div class="service-header card">
    <div class="service-image-large">
      <span class="service-icon">💇</span>
    </div>
    <div class="service-header-info">
      <h2>{{ service.name }}</h2>
      <p class="service-desc">{{ service.description }}</p>
      <div class="service-meta-large">
        <span class="service-price-large">¥{{ service.price }}</span>
        <span class="service-duration-large">约{{ service.duration }}分钟</span>
      </div>
      <button class="btn btn-primary" (click)="bookNow()">立即预约</button>
    </div>
  </div>

  <div class="service-content card">
    <h3>服务详情</h3>
    <p>{{ service.description }}</p>
  </div>
</div>

<div *ngIf="!loading && !service" class="empty">
  服务不存在
</div>
