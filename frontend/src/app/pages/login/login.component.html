<div class="login-container">
  <div class="login-card">
    <h2>欢迎回来</h2>
    <p class="login-subtitle">登录您的账户</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label>手机号码</label>
        <input type="tel" formControlName="phone" class="form-control" placeholder="请输入手机号码">
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" formControlName="password" class="form-control" placeholder="请输入密码">
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="submitting">
        {{ submitting ? '登录中...' : '登录' }}
      </button>
    </form>

    <div class="login-footer">
      <p>还没有账户？ <a (click)="goToRegister()" class="link">立即注册</a></p>
    </div>
  </div>
</div>
